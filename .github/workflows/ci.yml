name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  e2e-tmux:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Install tmux
        run: |
          sudo apt-get update
          sudo apt-get install -y tmux

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build release binary
        run: cargo build --release

      - name: Run isolated tmux end-to-end tests
        run: timeout 180 cargo test --test e2e_tmux -- --test-threads=1 --nocapture
